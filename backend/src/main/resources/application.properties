# ============================================================
# APPLICATION CONFIGURATION
# File: src/main/resources/application.properties
# ============================================================

# App name (shown in logs)
spring.application.name=RetailBillingSystem

# ============================================================
# DATABASE CONFIGURATION
# Change username/password to match your MySQL setup
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/retail_billing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE SETTINGS
# ============================================================
# update = auto creates/updates tables based on entity classes
# Use 'create' to drop and recreate on each run (careful!)
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080

# ============================================================
# CORS - Allow frontend (HTML files) to call the backend
# ============================================================
# This is handled in the controller using @CrossOrigin annotation
