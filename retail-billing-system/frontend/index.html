<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management | Textile Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── NAVIGATION ─────────────────────────────────────────── -->
<nav class="navbar">
    <div class="brand">🧵 Textile Billing System</div>
    <div class="nav-links">
        <a href="index.html" class="active">Products</a>
        <a href="billing.html">New Bill</a>
        <a href="bills.html">Bill History</a>
    </div>
</nav>

<!-- ── MAIN CONTENT ───────────────────────────────────────── -->
<div class="container">
    <div class="page-header">
        <h1>Product Management</h1>
        <button class="btn btn-primary" onclick="showAddForm()">+ Add Product</button>
    </div>

    <!-- ADD / EDIT PRODUCT FORM (hidden by default) -->
    <div id="productForm" class="card" style="display:none;">
        <h2 id="formTitle">Add New Product</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="pName" placeholder="e.g. Cotton Saree" />
                <span class="error" id="nameErr"></span>
            </div>
            <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" id="pPrice" placeholder="e.g. 850" min="1" />
                <span class="error" id="priceErr"></span>
            </div>
            <div class="form-group">
                <label>Quantity *</label>
                <input type="number" id="pQty" placeholder="e.g. 50" min="0" />
                <span class="error" id="qtyErr"></span>
            </div>
            <div class="form-group">
                <label>GST %</label>
                <input type="number" id="pGst" placeholder="e.g. 5" value="5" min="0" max="28" />
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-success" onclick="saveProduct()">💾 Save</button>
            <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by product name..."
               oninput="searchProducts()" />
    </div>

    <!-- PRODUCTS TABLE -->
    <div class="card">
        <table class="data-table" id="productTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Product Name</th>
                    <th>Price (₹)</th>
                    <th>Stock</th>
                    <th>GST %</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productBody">
                <tr><td colspan="6" class="loading">Loading products...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
<script>
    // ── CONSTANTS ──────────────────────────────────────────
    const API = 'http://localhost:8080/api/products';
    let editingId = null;  // null = add mode, number = edit mode

    // ── LOAD ALL PRODUCTS ON PAGE LOAD ─────────────────────
    window.onload = () => loadProducts();

    /**
     * LOAD PRODUCTS
     * Calls GET /api/products and populates the table
     */
    async function loadProducts() {
        try {
            const res = await fetch(API);
            const products = await res.json();
            renderTable(products);
        } catch (err) {
            showToast('Failed to load products. Is the server running?', 'error');
        }
    }

    /**
     * RENDER TABLE
     * Takes array of products and builds HTML rows
     */
    function renderTable(products) {
        const tbody = document.getElementById('productBody');
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="loading">No products found.</td></tr>';
            return;
        }
        tbody.innerHTML = products.map((p, i) => `
            <tr>
                <td>${i + 1}</td>
                <td><strong>${p.name}</strong></td>
                <td>₹${p.price.toFixed(2)}</td>
                <td>
                    <span class="badge ${p.quantity < 10 ? 'badge-danger' : 'badge-success'}">
                        ${p.quantity}
                    </span>
                </td>
                <td>${p.gstPercent || 5}%</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editProduct(${p.id})">✏️ Edit</button>
                    <button class="btn btn-sm btn-danger"  onclick="deleteProduct(${p.id}, '${p.name}')">🗑️ Delete</button>
                </td>
            </tr>
        `).join('');
    }

    /** Show the add form (reset fields) */
    function showAddForm() {
        editingId = null;
        document.getElementById('formTitle').textContent = 'Add New Product';
        document.getElementById('pName').value  = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pQty').value   = '';
        document.getElementById('pGst').value   = '5';
        clearErrors();
        document.getElementById('productForm').style.display = 'block';
        document.getElementById('pName').focus();
    }

    /** Populate form with product data for editing */
    async function editProduct(id) {
        try {
            const res = await fetch(`${API}/${id}`);
            const p = await res.json();
            editingId = id;
            document.getElementById('formTitle').textContent = 'Edit Product';
            document.getElementById('pName').value  = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pQty').value   = p.quantity;
            document.getElementById('pGst').value   = p.gstPercent || 5;
            clearErrors();
            document.getElementById('productForm').style.display = 'block';
        } catch (err) {
            showToast('Error loading product.', 'error');
        }
    }

    /** Hide the form */
    function hideForm() {
        document.getElementById('productForm').style.display = 'none';
    }

    /**
     * SAVE PRODUCT
     * Validates form, then calls POST (add) or PUT (edit) API
     */
    async function saveProduct() {
        clearErrors();
        const name  = document.getElementById('pName').value.trim();
        const price = parseFloat(document.getElementById('pPrice').value);
        const qty   = parseInt(document.getElementById('pQty').value);
        const gst   = parseFloat(document.getElementById('pGst').value) || 5;

        // Client-side validation
        let valid = true;
        if (!name) { document.getElementById('nameErr').textContent = 'Name is required'; valid = false; }
        if (!price || price < 1) { document.getElementById('priceErr').textContent = 'Enter valid price'; valid = false; }
        if (qty === undefined || qty < 0) { document.getElementById('qtyErr').textContent = 'Enter valid quantity'; valid = false; }
        if (!valid) return;

        const product = { name, price, quantity: qty, gstPercent: gst };

        try {
            const url    = editingId ? `${API}/${editingId}` : API;
            const method = editingId ? 'PUT' : 'POST';
            const res    = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });

            if (res.ok) {
                showToast(editingId ? 'Product updated!' : 'Product added!', 'success');
                hideForm();
                loadProducts();
            } else {
                const err = await res.json();
                showToast(JSON.stringify(err), 'error');
            }
        } catch (err) {
            showToast('Server error. Try again.', 'error');
        }
    }

    /**
     * DELETE PRODUCT
     * Calls DELETE /api/products/{id}
     */
    async function deleteProduct(id, name) {
        if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
        try {
            const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
            if (res.status === 204) {
                showToast('Product deleted.', 'success');
                loadProducts();
            } else {
                showToast('Cannot delete: may be used in existing bills.', 'error');
            }
        } catch (err) {
            showToast('Error deleting product.', 'error');
        }
    }

    /** Live search by name */
    async function searchProducts() {
        const query = document.getElementById('searchInput').value.trim();
        if (query.length === 0) { loadProducts(); return; }
        try {
            const res = await fetch(`${API}/search?name=${encodeURIComponent(query)}`);
            const products = await res.json();
            renderTable(products);
        } catch (err) { /* ignore */ }
    }

    function clearErrors() {
        ['nameErr','priceErr','qtyErr'].forEach(id => {
            document.getElementById(id).textContent = '';
        });
    }
</script>
</body>
</html>
